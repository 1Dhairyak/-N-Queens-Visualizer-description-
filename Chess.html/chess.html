<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Queens Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Link to the external CSS file -->
    <link rel="stylesheet" href="chess.css">
</head>
<body>

    <h1>N-Queens Visualizer</h1>

    <div class="controls">
        <div class="control-group">
            <label for="n-input">Board Size (N):</label>
            <input type="number" id="n-input" value="8" min="4" max="16">
        </div>
        <div class="control-group">
            <label for="speed-slider">Speed:</label>
            <input type="range" id="speed-slider" min="50" max="500" value="300">
        </div>
        <button id="startButton">Start Visualization</button>
        <button id="resetButton">Reset</button>
    </div>

    <div id="status-message">Press 'Start' to visualize.</div>

    <div id="chessboard"></div>

    <!-- Link to the external JavaScript file -->
    <script src="chess.js" defer></script>

</body>
</html>
